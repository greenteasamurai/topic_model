[phases.setup]
nixPkgs = ["nodejs_latest", "python311", "python311Packages.pip", "virtualenv"]

[phases.install]
cmds = [
  "cd frontend && npm ci && npm run build",
  "virtualenv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/python -m spacy download en_core_web_sm",
]

[start]
cmd = "cd backend && /opt/venv/bin/uvicorn api:app --host 0.0.0.0 --port $PORT"
